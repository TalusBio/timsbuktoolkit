name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""                       # default (rayon on for timsseek)
          - "--no-default-features"  # serial
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo build --verbose -p timsseek ${{ matrix.features }}
      - name: Run tests
        run: cargo test --verbose -p timsseek ${{ matrix.features }}
      # Raw-reader / staging / mzML-ingest coverage. Run once (default matrix
      # leg): timsseek alone doesn't exercise timscentroid's mzdata ingest,
      # tims_stage manifest staging, or the timsquery mobility gate.
      - name: Run reader + staging tests (mzdata)
        if: matrix.features == ''
        run: |
          cargo test -p timscentroid --features mzdata
          cargo test -p tims_stage -p timsquery
