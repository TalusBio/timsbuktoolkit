name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""                       # default (rayon on for timsseek)
          - "--no-default-features"  # serial
    steps:
      - uses: actions/checkout@v6
      - name: Apply crate patches (rustyms gnome.dat stub)
        run: |
          cargo install --git https://github.com/jspaezp/cargo-patch-crate patch-crate --locked
          cargo patch-crate
      - name: Build
        run: cargo build --verbose -p timsseek ${{ matrix.features }}
      - name: Run tests
        run: cargo test --verbose -p timsseek ${{ matrix.features }}
